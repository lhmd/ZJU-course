<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>登陆界面</title>
        <link rel="stylesheet" href="css/style.css"/>
    </head>
    <body>
        <div id="maxbox">
            <h1>LOGIN</h1><!--标题-->
            <div class="inputbox">
                <div class="inputText">
                    <input id="username"type="text"placeholder="username">
                </div>
                <div class="inputText">
                    <input id="password"type="text"placeholder="password">
                </div>
                <input class="inputButton"type="button" value="LOGIN IN"onclick="login()"/>
                </div>
                <div id="sign_up"><!--注册-->
                    <input class="inputButton"type="button" value="sign_up"onclick="submit()"/>
                </div>

            </div>


        </div>
        
    </body>
    <script src="main.js"></script><!--引入.js文件-->
</html>
